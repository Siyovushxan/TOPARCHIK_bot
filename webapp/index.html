<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>TOPARCHIK AI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Golos+Text:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      color-scheme: dark;
      font-family: "Golos Text", "Segoe UI", sans-serif;
      --bg: #0f172a;
      --bg-deep: #000000;
      --card: rgba(16, 22, 48, 0.86);
      --glass: rgba(255, 255, 255, 0.08);
      --stroke: rgba(255, 255, 255, 0.14);
      --text: #f7f8ff;
      --muted: #a7b3e6;
      --accent: #22d3ee;
      --accent-2: #7c3aed;
      --accent-3: #4f46e5;
      --shadow: 0 18px 40px rgba(5, 10, 30, 0.45);
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      color: var(--text);
      background:
        radial-gradient(circle at 12% 10%, rgba(34, 211, 238, 0.18), transparent 42%),
        radial-gradient(circle at 85% 0%, rgba(124, 58, 237, 0.18), transparent 46%),
        linear-gradient(180deg, #0f172a 0%, #0b1120 60%, #000 100%);
    }
    .app {
      max-width: 560px;
      margin: 0 auto;
      padding: calc(18px + var(--safe-top)) 16px calc(160px + var(--safe-bottom));
      min-height: 100vh;
      position: relative;
    }
    .hero {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 14px;
    }
    .hero h1 {
      margin: 2px 0 0;
      font-size: 24px;
      font-weight: 700;
      letter-spacing: 0.2px;
    }
    .hero small {
      color: var(--muted);
      font-size: 12px;
    }
    .badge {
      padding: 6px 12px;
      border-radius: 999px;
      border: 1px solid rgba(34, 211, 238, 0.5);
      color: var(--accent);
      font-size: 12px;
      font-weight: 600;
      background: rgba(34, 211, 238, 0.08);
    }
    .search-wrap {
      margin: 12px 0 14px;
      position: relative;
    }
    .search-input {
      width: 100%;
      padding: 12px 14px;
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.12);
      color: var(--text);
      font-size: 13px;
    }
    .chips {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      padding-bottom: 4px;
      scrollbar-width: none;
    }
    .chips::-webkit-scrollbar { display: none; }
    .chip {
      flex-shrink: 0;
      padding: 6px 12px;
      border-radius: 999px;
      border: 1px solid rgba(255, 255, 255, 0.12);
      color: var(--muted);
      font-size: 12px;
      background: rgba(255, 255, 255, 0.04);
      cursor: pointer;
    }
    .chip.active {
      color: var(--accent);
      border-color: rgba(34, 211, 238, 0.6);
      background: rgba(34, 211, 238, 0.15);
    }
    .view {
      display: none;
      margin-top: 16px;
    }
    .view.active {
      display: block;
    }
    .list {
      display: grid;
      gap: 12px;
    }
    .song-card {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 14px 14px;
      border-radius: 16px;
      background: rgba(16, 24, 46, 0.78);
      border: 1px solid rgba(255, 255, 255, 0.12);
      backdrop-filter: blur(18px);
      transition: transform 0.15s ease, border 0.2s ease;
    }
    .song-card:active { transform: scale(0.98); }
    .song-card.is-playing {
      border-color: rgba(34, 211, 238, 0.6);
      box-shadow: 0 0 0 1px rgba(34, 211, 238, 0.35);
    }
    .song-left {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
      flex: 1;
    }
    .platform-icon {
      width: 38px;
      height: 38px;
      border-radius: 12px;
      display: grid;
      place-items: center;
      font-size: 18px;
      background: rgba(34, 211, 238, 0.12);
      color: var(--accent);
      flex-shrink: 0;
    }
    .song-title {
      margin: 0;
      font-size: 14px;
      font-weight: 600;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .marquee {
      display: inline-block;
      padding-right: 16px;
      animation: marquee 8s linear infinite;
    }
    @keyframes marquee {
      0% { transform: translateX(0); }
      100% { transform: translateX(-100%); }
    }
    .song-artist {
      margin: 4px 0 0;
      font-size: 12px;
      color: var(--muted);
    }
    .song-meta {
      margin: 4px 0 0;
      font-size: 11px;
      color: #7c88b8;
    }
    .song-actions {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .play-button {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      border: none;
      color: #001018;
      font-weight: 700;
      cursor: pointer;
    }
    .more-button {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.12);
      color: var(--muted);
      cursor: pointer;
    }
    .menu {
      position: absolute;
      right: 10px;
      top: 52px;
      background: rgba(10, 16, 30, 0.95);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 12px;
      padding: 6px;
      display: none;
      z-index: 2;
    }
    .menu button {
      width: 100%;
      padding: 8px 12px;
      text-align: left;
      background: transparent;
      border: none;
      color: var(--text);
      font-size: 12px;
      cursor: pointer;
    }
    .menu.show { display: block; }
    .mini-player {
      position: fixed;
      left: 50%;
      transform: translateX(-50%);
      bottom: calc(72px + var(--safe-bottom));
      width: min(520px, calc(100% - 24px));
      padding: 10px 14px;
      border-radius: 16px;
      background: rgba(12, 18, 32, 0.92);
      border: 1px solid rgba(255, 255, 255, 0.12);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      z-index: 4;
    }
    .mini-left {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
      flex: 1;
    }
    .mini-title {
      font-size: 12px;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .mini-marquee {
      display: inline-block;
      animation: marquee 8s linear infinite;
    }
    .mini-actions button {
      width: 30px;
      height: 30px;
      border-radius: 50%;
      border: none;
      background: rgba(34, 211, 238, 0.2);
      color: var(--accent);
      cursor: pointer;
    }
    .bottom-nav {
      position: fixed;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: min(520px, 100%);
      display: flex;
      justify-content: space-around;
      padding: 12px 16px calc(16px + var(--safe-bottom));
      background: rgba(6, 10, 20, 0.95);
      border-top: 1px solid rgba(255, 255, 255, 0.08);
      z-index: 3;
    }
    .nav-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      font-size: 11px;
      color: var(--muted);
      cursor: pointer;
    }
    .nav-item.active { color: var(--accent); }
    .sheet-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.6);
      backdrop-filter: blur(4px);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s ease;
      z-index: 8;
    }
    .sheet-backdrop.show {
      opacity: 1;
      pointer-events: auto;
    }
    .sheet {
      position: fixed;
      left: 50%;
      transform: translateX(-50%);
      bottom: -100%;
      width: min(520px, 100%);
      padding: 24px 18px calc(28px + var(--safe-bottom));
      border-radius: 24px 24px 0 0;
      background: linear-gradient(180deg, rgba(10, 16, 32, 0.98), rgba(3, 6, 12, 0.98));
      border: 1px solid rgba(255, 255, 255, 0.12);
      z-index: 9;
      transition: bottom 0.25s ease;
    }
    .sheet.show { bottom: 0; }
    .sheet-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }
    .disc {
      width: 220px;
      height: 220px;
      margin: 0 auto 16px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(34, 211, 238, 0.2) 10%, rgba(124, 58, 237, 0.12) 45%, rgba(10, 16, 32, 0.9) 70%);
      border: 2px solid rgba(255, 255, 255, 0.08);
      position: relative;
      animation: spin 10s linear infinite;
      animation-play-state: paused;
    }
    .disc.playing { animation-play-state: running; }
    .disc::after {
      content: "";
      position: absolute;
      inset: 16px;
      border-radius: 50%;
      border: 1px solid rgba(255, 255, 255, 0.08);
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    .sheet-title {
      text-align: center;
      font-size: 18px;
      font-weight: 700;
      margin: 6px 0;
    }
    .sheet-artist {
      text-align: center;
      color: var(--muted);
      font-size: 13px;
      margin-bottom: 16px;
    }
    .progress {
      display: flex;
      align-items: center;
      gap: 8px;
      margin: 10px 0 16px;
    }
    .progress input[type="range"] { flex: 1; }
    .sheet-controls {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 14px;
      margin-top: 6px;
    }
    .circle-btn {
      width: 54px;
      height: 54px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.12);
      color: var(--text);
      font-size: 16px;
      cursor: pointer;
    }
    .circle-btn.play {
      width: 64px;
      height: 64px;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      color: #001018;
    }
    .stat-row {
      display: flex;
      justify-content: center;
      gap: 18px;
      font-size: 11px;
      color: var(--muted);
      margin-top: 10px;
    }
    audio { display: none; }
    .empty-state {
      padding: 18px;
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.06);
      border: 1px dashed rgba(255, 255, 255, 0.18);
      color: #b9c2ee;
      font-size: 14px;
      line-height: 1.6;
      text-align: center;
    }
    .skeleton {
      height: 66px;
      border-radius: 16px;
      background: linear-gradient(90deg, rgba(255,255,255,0.06), rgba(255,255,255,0.12), rgba(255,255,255,0.06));
      animation: pulse 1.4s ease infinite;
    }
    @keyframes pulse {
      0% { opacity: 0.5; }
      50% { opacity: 1; }
      100% { opacity: 0.5; }
    }
    .time {
      font-size: 11px;
      color: #b8c3f0;
      min-width: 36px;
      text-align: center;
    }

    @media (max-width: 420px) {
      .app {
        padding: calc(14px + var(--safe-top)) 12px calc(150px + var(--safe-bottom));
      }
      .hero h1 { font-size: 20px; }
      .search-input { padding: 10px 12px; font-size: 12px; }
      .chip { padding: 6px 10px; font-size: 11px; }
      .song-card { padding: 12px; gap: 10px; }
      .platform-icon { width: 34px; height: 34px; font-size: 16px; }
      .song-title { font-size: 13px; }
      .play-button { width: 32px; height: 32px; }
      .mini-player { bottom: calc(66px + var(--safe-bottom)); padding: 8px 12px; }
      .bottom-nav { padding: 10px 12px calc(12px + var(--safe-bottom)); }
      .disc { width: 180px; height: 180px; }
      .circle-btn { width: 48px; height: 48px; }
      .circle-btn.play { width: 58px; height: 58px; }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="hero">
      <div>
        <small>Xush kelibsiz</small>
        <h1>TOPARCHIK AI</h1>
      </div>
      <div class="badge">BOT</div>
    </div>

    <div class="search-wrap">
      <input id="searchInput" class="search-input" placeholder="Qo'shiq yoki ijrochi..." />
    </div>

    <div class="chips" id="chipRow">
      <button class="chip active" data-tab="top">🔥 Top</button>
      <button class="chip" data-tab="instagram">📱 Instagram</button>
      <button class="chip" data-tab="youtube">▶️ YouTube</button>
      <button class="chip" data-tab="tiktok">🎵 TikTok</button>
      <button class="chip" data-tab="all">♾️ Barchasi</button>
    </div>

    <section id="homeView" class="view active">
      <div id="homeList" class="list"></div>
    </section>

    <section id="artistsView" class="view">
      <div id="artistList" class="list"></div>
    </section>

    <section id="artistDetailView" class="view">
      <div class="hero" style="margin-bottom:12px;">
        <div>
          <small>Ijrochi</small>
          <h1 id="artistName">Artist</h1>
        </div>
        <button class="badge" id="artistBack">Orqaga</button>
      </div>
      <div id="artistSongs" class="list"></div>
    </section>

    <section id="libraryView" class="view">
      <div class="hero" style="margin-bottom:12px;">
        <div>
          <small>Mening</small>
          <h1>Mening Musiqalarim</h1>
        </div>
        <div class="badge" id="libraryCount">0</div>
      </div>
      <div id="libraryList" class="list"></div>
    </section>
  </div>

  <div id="miniPlayer" class="mini-player" style="display:none;">
    <div class="mini-left">
      <div class="platform-icon">🎵</div>
      <div class="mini-title" id="miniTitle">--</div>
    </div>
    <div class="mini-actions">
      <button id="miniPlay">▶</button>
      <button id="miniNext">⏭</button>
    </div>
  </div>

  <nav class="bottom-nav">
    <div class="nav-item active" data-nav="home">🏠 Asosiy</div>
    <div class="nav-item" data-nav="artists">🎤 Ijrochilar</div>
    <div class="nav-item" data-nav="library">💾 Mening</div>
  </nav>

  <div id="sheetBackdrop" class="sheet-backdrop"></div>
  <div id="playerSheet" class="sheet">
    <div class="sheet-header">
      <button class="badge" id="sheetClose">⬇</button>
      <div class="badge" id="sheetFav">♡</div>
    </div>
    <div id="disc" class="disc"></div>
    <div class="sheet-title" id="sheetTitle">--</div>
    <div class="sheet-artist" id="sheetArtist">--</div>
    <div class="progress">
      <span class="time" id="sheetCurrent">0:00</span>
      <input type="range" id="sheetSeek" min="0" max="100" value="0" />
      <span class="time" id="sheetTotal">0:00</span>
    </div>
    <div class="sheet-controls">
      <button class="circle-btn" id="sheetPrev">⏮</button>
      <button class="circle-btn play" id="sheetPlay">⏯</button>
      <button class="circle-btn" id="sheetNext">⏭</button>
    </div>
    <div class="stat-row" id="sheetStats"></div>
    <audio id="audio-player" preload="none"></audio>
  </div>

  <script src="/webapp-static/app.js"></script>
</body>
</html>
