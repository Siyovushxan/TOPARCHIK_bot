name: Build and Deploy to Cloud Run and Firebase

on:
  push:
    branches:
      - main

env:
  PROJECT_ID: toparchik
  SERVICE_NAME: toparchik-bot
  REGION: us-central1

jobs:
  deploy-bot:
    name: Deploy Bot to Cloud Run
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Google Auth
        id: auth
        uses: 'google-github-actions/auth@v2'
        with:
          credentials_json: '${{ secrets.GCP_SA_KEY }}'

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Deploy to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.SERVICE_NAME }}
          region: ${{ env.REGION }}
          source: ./
          flags: '--allow-unauthenticated --memory=2Gi --cpu=2'
          env_vars: |-
            PUBLIC_DOMAIN=${{ secrets.PUBLIC_DOMAIN }}
            BOT_TOKEN=${{ secrets.BOT_TOKEN }}
            GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}
            YOUTUBE_COOKIES=${{ secrets.YOUTUBE_COOKIES }}
            ARCHIVE_CHANNEL=${{ secrets.ARCHIVE_CHANNEL }}
            ADMIN_IDS=${{ secrets.ADMIN_IDS }}

  deploy-hosting:
    name: Deploy Web App to Firebase Hosting
    runs-on: ubuntu-latest
    needs: deploy-bot
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: '${{ secrets.GITHUB_TOKEN }}'
          firebaseServiceAccount: '${{ secrets.FIREBASE_SERVICE_ACCOUNT_TOPARCHIK }}'
          channelId: live
          projectId: toparchik
